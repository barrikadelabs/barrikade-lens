# ──────────────────────────────────────────────────────────────
# Publish barrikade-lens CLI to npm
#
# Triggers on:
#   - Git tag matching v* (e.g., v0.1.0, v0.2.0)
#
# Auth: Uses NPM_TOKEN repository secret.
# ──────────────────────────────────────────────────────────────
name: Publish CLI to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm Trusted Publishers (OIDC authentication)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm to latest version
        run: npm install -g npm@latest

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "❌ Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
          
          echo "✅ Version $PKG_VERSION matches tag"

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm (Keyless OIDC)
        run: npm publish --no-provenance --access public
